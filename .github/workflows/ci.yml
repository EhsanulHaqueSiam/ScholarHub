name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install web dependencies
        run: cd web && bun install --frozen-lockfile

      - name: Lint (Biome)
        run: cd web && bun biome check .

      - name: Type check
        run: cd web && bun tsc --noEmit

  validate-sources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: cd scraping && uv sync

      - name: Validate source catalog against JSON Schema
        run: |
          cd scraping && uv run check-jsonschema \
            --schemafile sources/schema.json \
            sources/aggregators.json \
            sources/official_programs.json \
            sources/government.json \
            sources/foundations.json \
            2>/dev/null || echo "No source files to validate yet"

  validate-configs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Install Python dependencies
        run: cd scraping && uv sync

      - name: Validate all pipeline configs
        run: cd scraping && uv run scrape validate

      - name: Check config-catalog sync
        run: cd scraping && uv run pytest tests/test_configs/test_config_protocol.py::TestConfigProtocol::test_config_catalog_sync -x --timeout=30
